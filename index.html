<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮枯有時預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #fdfaf7; color: #8c7355; margin: 0;">
    <div style="text-align: center;">
        <p style="font-size: 18px; letter-spacing: 2px;">榮枯有時 Fade & Blossom</p>
        <p id="status" style="font-size: 14px; color: #bca08d;">系統讀取中...</p>
    </div>

    <script>
        async function main() {
            try {
                await liff.init({ liffId: "2009304285-bqxMPnTE" });

                if (!liff.isLoggedIn()) {
                    // 關鍵修正：強迫 LINE 登入後回到 GitHub 本身，而不是跳去 Tally
                    liff.login({ redirectUri: window.location.href });
                } else {
                    document.getElementById('status').innerText = "驗證成功，跳轉中...";
                    const profile = await liff.getProfile();
                    const userId = profile.userId;

                    // 抓到 ID 後，手動組合成 Tally 網址
                    const destination = "https://tally.so/r/81dyyO?userId=" + userId;
                    
                    // 使用 replace 確保瀏覽器不會留存中間頁面的紀錄
                    window.location.replace(destination);
                }
            } catch (err) {
                console.error(err);
                // 發生錯誤時的保險機制
                document.getElementById('status').innerText = "跳轉失敗，嘗試直接開啟...";
                window.location.replace("https://tally.so/r/81dyyO");
            }
        }
        main();
    </script>
</body>
</html>
