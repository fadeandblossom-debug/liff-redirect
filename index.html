<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮枯有時預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #fdfaf7; color: #8c7355; margin: 0;">
    <div style="text-align: center;">
        <p style="font-size: 18px; letter-spacing: 2px;">榮枯有時 Fade & Blossom</p>
        <p id="status" style="font-size: 14px; color: #bca08d;">身分驗證中...</p>
    </div>

    <script>
        async function main() {
            // 你的 GitHub 網址 (請確保結尾有斜線)
            const myUrl = "https://fadeandblossom-debug.github.io/liff-redirect/";
            
            try {
                await liff.init({ liffId: "2009304285-bqxMPnTE" });

                if (!liff.isLoggedIn()) {
                    // 關鍵修正：明確指定 redirectUri，避免 LINE 抓錯網址
                    liff.login({ redirectUri: myUrl });
                } else {
                    document.getElementById('status').innerText = "跳轉中...";
                    const profile = await liff.getProfile();
                    const userId = profile.userId;

                    // 最終目的地：Tally
                    const finalUrl = "https://tally.so/r/81dyyO?userId=" + userId;
                    window.location.replace(finalUrl);
                }
            } catch (err) {
                console.error(err);
                // 發生錯誤時的保險跳轉
                window.location.replace("https://tally.so/r/81dyyO");
            }
        }
        main();
    </script>
</body>
</html>
