<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榮枯有時預約系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #fdfaf7; color: #8c7355; margin: 0;">
    <div style="text-align: center;">
        <p style="font-size: 18px; letter-spacing: 2px;">榮枯有時 Fade & Blossom</p>
        <p id="status" style="font-size: 14px; color: #bca08d;">身分驗證中...</p>
    </div>

    <script>
        async function main() {
            try {
                // 1. 初始化 LIFF，不使用自動跳轉
                await liff.init({ liffId: "2009304285-bqxMPnTE" });

                if (!liff.isLoggedIn()) {
                    // 如果沒登入，就在目前頁面登入
                    liff.login();
                } else {
                    document.getElementById('status').innerText = "跳轉中...";
                    // 2. 取得 User ID
                    const profile = await liff.getProfile();
                    const userId = profile.userId;

                    // 3. 關鍵：用 replace 強迫跳轉到「有帶 ID」的 Tally 網址
                    // 這樣就不會被 LINE 原本空的 redirectUri 干擾
                    const finalUrl = "https://tally.so/r/81dyyO?userId=" + userId;
                    window.location.replace(finalUrl);
                }
            } catch (err) {
                console.error(err);
                window.location.replace("https://tally.so/r/81dyyO");
            }
        }
        main();
    </script>
</body>
</html>
